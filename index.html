
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 24/7 - THE CHANNEL</title>
    <style>
        body { background-color: #050a0f; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .tv-frame { border: 10px solid #1a1a1a; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }

        /* Header estilo Noticiero (Ref: 1000015563.png) */
        header { background: linear-gradient(90deg, #001f3f, #0074D9); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff851b; }
        .logo { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #00f2ff; }

        /* Main Dashboard (Ref: 1000014074.png) */
        .dashboard { flex: 1; display: grid; grid-template-columns: 2fr 1fr; gap: 10px; padding: 20px; }
        .main-screen { border: 2px solid #00f2ff; background: rgba(0, 242, 255, 0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .profit-display { font-size: 80px; color: #ff851b; text-shadow: 0 0 20px #ff851b; }

        /* Ticker Inferior */
        .ticker { background: #000; color: #ff851b; padding: 10px; white-space: nowrap; overflow: hidden; border-top: 2px solid #00f2ff; }
        .ticker-content { display: inline-block; animation: scroll 20s linear infinite; }

        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div class="tv-frame">
        <header>
            <div class="logo">CHANNEL 24/7</div>
            <div id="clock" style="color: #fff;">18:42:49</div>
        </header>

        <div class="dashboard">
            <div class="main-screen">
                <div style="font-size: 20px;">PROFIT TARGET: $100.00</div>
                <div class="profit-display" id="total_profit">$50.50</div>
                <div style="color: #00f2ff;">STATUS: AUTONOMOUS BROADCAST</div>
            </div>
            <div class="side-panel">
                <div style="border: 1px solid #00f2ff; padding: 10px; margin-bottom: 10px;">
                    <strong>NODE_ALPHA:</strong> ONLINE
                </div>
                <div style="border: 1px solid #00f2ff; padding: 10px;">
                    <strong>RADAR_YT:</strong> UCJ5v_MCY6G...
                </div>
            </div>
        </div>

        <div class="ticker">
            <div class="ticker-content" id="terminal_msg">
                SINCRO EXITOSA: $50.50 USD transmitiéndose a la TV... NODE_ALPHA: STABLE... ANALIZANDO TENDENCIAS YOUTUBE...
            </div>
        </div>
    </div>

    <script>
        // Función para leer el pulso de GitHub
        async function updateTV() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/lisafigueroa490-sketch/BETH-OS-REPO/main/heartbeat.json');
                const data = await response.json();
                document.getElementById('total_profit').innerText = data.total || data.profit;
                document.getElementById('terminal_msg').innerText = data.terminal_msg || data.terminal_log;
            } catch (e) { console.log("Buscando señal..."); }
        }
        setInterval(updateTV, 5000);
    </script>
</body>
</html>
