<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETH OS | $100 TARGET</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .dashboard { border: 1px solid #d4af37; padding: 50px; background: rgba(212, 175, 55, 0.05); box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); text-align: center; border-radius: 10px; }
        .money { font-size: 5rem; color: #fff; margin: 20px 0; text-shadow: 0 0 20px #00ff41; }
        .label { color: #d4af37; letter-spacing: 5px; font-weight: bold; }
        .status-bar { width: 100%; height: 5px; background: #222; margin-top: 20px; position: relative; }
        .progress { height: 100%; background: #00ff41; width: 35%; box-shadow: 0 0 10px #00ff41; transition: width 1s ease-in-out; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="label">TOTAL PROFIT ACUMULADO</div>
        <div class="money" id="profit">$35.00</div>
        <div class="label">META: $100.00 USD</div>
        <div class="status-bar"><div class="progress" id="bar"></div></div>
        <p id="msg" style="font-size: 0.8rem; margin-top: 20px; opacity: 0.7;">SINCRONIZADO CON BETH OS V3.5</p>
    </div>
    <script>
        async function refresh() {
            try {
                const r = await fetch('heartbeat.json?' + Math.random());
                const d = await r.json();
                document.getElementById('profit').innerText = d.total || "$35.00";
                // Lógica de barra de progreso dinámica
                const val = parseFloat((d.total || "35").replace('$', ''));
                document.getElementById('bar').style.width = val + "%";
            } catch(e) {}
        }
        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
